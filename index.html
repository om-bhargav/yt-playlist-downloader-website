<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'oklch(0.6083 0.209 27.0276)',
                        dark: {
                            bg: '#18181b',    // soft dark background (zinc-900)
                            card: '#27272a',  // soft dark card (zinc-800)
                            border: '#3f3f46' // zinc-700
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        body { background-color: theme('colors.dark.bg'); color: #e4e4e7; }
        .btn-primary {
            background-color: theme('colors.primary');
            color: #ffffff;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px theme('colors.primary');
        }
    </style>
</head>
<body class="antialiased selection:bg-primary selection:text-white">
    <div id="root"></div>

    <script type="module">
        import React from "https://esm.sh/react@18";
        import { createRoot } from "https://esm.sh/react-dom@18/client";

        const e = React.createElement;
        const { useState } = React;
        const DOWNLOAD_LINK = "https://github.com/om-bhargav/Youtube-video-playlist-downloader/archive/refs/tags/1.0.zip";

        const Navbar = () => {
            const [isOpen, setIsOpen] = useState(false);

            return e('nav', { className: 'fixed w-full z-50 bg-dark-bg/90 backdrop-blur-md border-b border-dark-border py-4' },
                e('div', { className: 'max-w-7xl mx-auto px-6 flex justify-between items-center' },
                    e('a', { href: '#hero', className: 'text-2xl font-bold flex items-center gap-2 text-white' },
                        e('i', { className: 'fa-solid fa-cloud-arrow-down text-primary' }),
                        'YT Downloader'
                    ),
                    e('div', { className: 'hidden md:flex space-x-8 items-center text-gray-300' },
                        e('a', { href: '#features', className: 'hover:text-primary transition-colors' }, 'Features'),
                        e('a', { href: '#how-to-use', className: 'hover:text-primary transition-colors' }, 'How to Use'),
                        e('a', { href: '#testimonials', className: 'hover:text-primary transition-colors' }, 'Testimonials'),
                        e('a', { href: DOWNLOAD_LINK, className: 'btn-primary px-6 py-2 rounded-full font-medium' }, 'Download')
                    ),
                    e('button', { onClick: () => setIsOpen(!isOpen), className: 'md:hidden text-2xl text-gray-300' },
                        e('i', { className: isOpen ? 'fa-solid fa-xmark' : 'fa-solid fa-bars' })
                    )
                ),
                isOpen && e('div', { className: 'md:hidden bg-dark-card border-b border-dark-border py-4 px-6 flex flex-col gap-4' },
                    e('a', { href: '#features', onClick: () => setIsOpen(false) }, 'Features'),
                    e('a', { href: '#how-to-use', onClick: () => setIsOpen(false) }, 'How to Use'),
                    e('a', { href: '#testimonials', onClick: () => setIsOpen(false) }, 'Testimonials'),
                    e('a', { href: DOWNLOAD_LINK, className: 'text-primary font-bold' }, 'Download Now')
                )
            );
        };

        const Hero = () => e('section', { id: 'hero', className: 'pt-40 pb-24 px-6 text-center max-w-5xl mx-auto flex flex-col items-center' },
            e('h1', { className: 'text-5xl md:text-7xl font-extrabold text-white leading-tight mb-6' },
                'Download YouTube Content ',
                e('span', { className: 'text-primary' }, 'Instantly')
            ),
            e('p', { className: 'text-lg md:text-xl text-gray-400 mb-10 max-w-2xl' },
                'The simplest, fastest way to download single videos or entire playlists directly to your computer.'
            ),
            e('a', { href: DOWNLOAD_LINK, className: 'btn-primary px-8 py-4 rounded-full text-lg font-bold flex items-center gap-3' },
                e('i', { className: 'fa-solid fa-download' }),
                'Download the .ZIP File'
            )
        );

        const Features = () => {
            const features = [
                { icon: 'fa-video', title: 'High Quality', desc: 'Download in the highest available resolution automatically.' },
                { icon: 'fa-list-check', title: 'Playlist Support', desc: 'Grab entire playlists with a single click, saving you hours.' },
                { icon: 'fa-bolt', title: 'Lightning Fast', desc: 'Optimized network requests for maximum download speeds.' }
            ];
            return e('section', { id: 'features', className: 'py-24 bg-dark-card px-6' },
                e('div', { className: 'max-w-7xl mx-auto' },
                    e('h2', { className: 'text-3xl font-bold text-center text-white mb-16' }, 'Powerful Features'),
                    e('div', { className: 'grid md:grid-cols-3 gap-8' },
                        features.map((f, i) => e('div', { key: i, className: 'p-8 rounded-2xl bg-dark-bg border border-dark-border hover:border-primary/50 transition-colors' },
                            e('div', { className: 'w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center mb-6' },
                                e('i', { className: `fa-solid ${f.icon} text-2xl text-primary` })
                            ),
                            e('h3', { className: 'text-xl font-bold text-white mb-3' }, f.title),
                            e('p', { className: 'text-gray-400' }, f.desc)
                        ))
                    )
                )
            );
        };

        const HowToUse = () => {
            const steps = [
                { num: '1', title: 'Extract the App', desc: 'Download the .ZIP file and extract it to your preferred folder.' },
                { num: '2', title: 'Paste URL', desc: 'Open the app and paste your YouTube video or playlist link.' },
                { num: '3', title: 'Save', desc: 'Choose your quality settings and hit download to save locally.' }
            ];
            return e('section', { id: 'how-to-use', className: 'py-24 px-6' },
                e('div', { className: 'max-w-4xl mx-auto' },
                    e('h2', { className: 'text-3xl font-bold text-center text-white mb-16' }, 'How It Works'),
                    e('div', { className: 'flex flex-col gap-8' },
                        steps.map((s, i) => e('div', { key: i, className: 'flex items-start gap-6 p-6 rounded-2xl bg-dark-card border border-dark-border' },
                            e('div', { className: 'w-12 h-12 shrink-0 rounded-full bg-primary flex items-center justify-center text-white font-bold text-xl' }, s.num),
                            e('div', null,
                                e('h3', { className: 'text-xl font-bold text-white mb-2' }, s.title),
                                e('p', { className: 'text-gray-400' }, s.desc)
                            )
                        ))
                    )
                )
            );
        };

        const Testimonials = () => {
            const reviews = [
                { quote: "Finally an app that handles playlists without crashing. It's incredibly fast and clean.", name: "Alex P." },
                { quote: "Super simple to use. Downloaded, extracted, and got my videos in minutes.", name: "Jamie L." }
            ];
            return e('section', { id: 'testimonials', className: 'py-24 bg-dark-card px-6' },
                e('div', { className: 'max-w-5xl mx-auto' },
                    e('h2', { className: 'text-3xl font-bold text-center text-white mb-16' }, 'User Testimonials'),
                    e('div', { className: 'grid md:grid-cols-2 gap-8' },
                        reviews.map((r, i) => e('div', { key: i, className: 'p-8 rounded-2xl bg-dark-bg border border-dark-border' },
                            e('i', { className: 'fa-solid fa-quote-left text-primary/40 text-3xl mb-4' }),
                            e('p', { className: 'text-gray-300 text-lg mb-6 italic' }, `"${r.quote}"`),
                            e('p', { className: 'text-white font-bold' }, r.name)
                        ))
                    )
                )
            );
        };

        const CTA = () => e('section', { className: 'py-24 px-6 text-center' },
            e('div', { className: 'max-w-3xl mx-auto bg-primary/10 border border-primary/20 rounded-3xl p-12' },
                e('h2', { className: 'text-3xl md:text-4xl font-bold text-white mb-6' }, 'Ready to start downloading?'),
                e('p', { className: 'text-gray-400 mb-8 text-lg' }, 'Get the lightweight tool today and build your offline library.'),
                e('a', { href: DOWNLOAD_LINK, className: 'btn-primary inline-flex px-8 py-4 rounded-full text-lg font-bold gap-3' },
                    e('i', { className: 'fa-solid fa-download' }),
                    'Download Now'
                )
            )
        );

        const Footer = () => e('footer', { className: 'bg-dark-card border-t border-dark-border py-10 text-center px-6' },
            e('p', { className: 'text-gray-500 mb-4' }, '© 2024 YT Downloader Pro. All rights reserved.'),
            e('div', { className: 'flex justify-center gap-6 text-gray-400' },
                e('a', { href: '#', className: 'hover:text-primary transition-colors' }, e('i', { className: 'fa-brands fa-github text-xl' })),
                e('a', { href: '#', className: 'hover:text-primary transition-colors' }, e('i', { className: 'fa-brands fa-twitter text-xl' }))
            )
        );

        const App = () => e(React.Fragment, null,
            e(Navbar), e(Hero), e(Features), e(HowToUse), e(Testimonials), e(CTA), e(Footer)
        );

        createRoot(document.getElementById('root')).render(e(App));
    </script>
</body>
</html>
